name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Set version
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "mcmetrics-exporter ${{ steps.vars.outputs.version }}"
          files: |
            bukkit/build/libs/*.jar
            velocity/build/libs/*.jar

  bundle:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shadow jars
        run: ./gradlew :mcmetrics-exporter-bukkit:shadowJar :mcmetrics-exporter-velocity:shadowJar --no-daemon

      - name: Prepare jars for Bundlefiles
        run: |
          cp bukkit/build/libs/mcmetrics-exporter-bukkit-*.jar bukkit/build/libs/mcmetrics-exporter-bukkit.jar
          cp velocity/build/libs/mcmetrics-exporter-velocity-*.jar velocity/build/libs/mcmetrics-exporter-velocity.jar

      - name: Set version
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install bundle
        uses: sigoden/install-binary@v1
        with:
          repo: MeProjectStudio/bundle
          name: bundle

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | bundle login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push bukkit bundle image
        run: |
          bundle build ./bukkit/
          bundle push ghcr.io/${{ github.repository_owner }}/mcmetrics-exporter-bukkit:${{ steps.vars.outputs.version }}
          bundle push ghcr.io/${{ github.repository_owner }}/mcmetrics-exporter-bukkit:latest

      - name: Build and push velocity bundle image
        run: |
          bundle build ./velocity/
          bundle push ghcr.io/${{ github.repository_owner }}/mcmetrics-exporter-velocity:${{ steps.vars.outputs.version }}
          bundle push ghcr.io/${{ github.repository_owner }}/mcmetrics-exporter-velocity:latest

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Publish
        run: ./gradlew :mcmetrics-exporter-api:publish :mcmetrics-exporter-common:publish --no-daemon
        env:
          MAVEN_REPO_USER: ${{ secrets.MAVEN_REPO_USER }}
          MAVEN_REPO_PASS: ${{ secrets.MAVEN_REPO_PASS }}
