name: preview

on:
  push:
    branches: ["dev/*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Set version
        id: vars
        run: echo "version=${GITHUB_REF#refs/heads/dev/}" >> $GITHUB_OUTPUT

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.vars.outputs.version }}-SNAPSHOT"
          name: "Development Build (${{ steps.vars.outputs.version }})"
          prerelease: true
          files: |
            bukkit/build/libs/*.jar
            velocity/build/libs/*.jar

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish
        run: ./gradlew :mcmetrics-exporter-api:publish :mcmetrics-exporter-common:publish --no-daemon
        env:
          MAVEN_REPO_USER: ${{ secrets.MAVEN_REPO_USER }}
          MAVEN_REPO_PASS: ${{ secrets.MAVEN_REPO_PASS }}
